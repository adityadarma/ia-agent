services:
  server:
    build: ./server
    container_name: ai-agent-server
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:3b}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - API_KEY=${API_KEY}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-120}
    depends_on:
      - ollama
      - redis
    networks:
      - internal_net
      - public_net
    volumes:
      - ./:/app/workspace
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${SERVER_MEMORY_LIMIT:-768M}
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000" ]
      interval: 30s
      timeout: 5s
      retries: 3

  ollama:
    build: ./ollama
    container_name: ollama
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:3b}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-2048}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-10m}
    networks:
      - internal_net
      - public_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT:-3G}
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:alpine
    container_name: ai-redis
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - ./data/redis:/data
    networks:
      - internal_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-384M}

networks:
  public_net:
    driver: bridge

  internal_net:
    driver: bridge
    internal: true
