services:
  server:
    build: ./server
    container_name: ai-agent-server
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - REDIS_HOST=redis
      - API_KEY=supersecret123
    depends_on:
      - ollama
      - redis
    networks:
      - internal_net
      - public_net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000" ]
      interval: 30s
      timeout: 5s
      retries: 3

  ollama:
    build: ./ollama
    container_name: ollama
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_CONTEXT_LENGTH=2048
      - OLLAMA_KEEP_ALIVE=10m
    networks:
      - internal_net
      - public_net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:11434" ]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:alpine
    container_name: ai-redis
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - ./redis_data:/data
    networks:
      - internal_net
    restart: unless-stopped

networks:
  public_net:
    driver: bridge

  internal_net:
    driver: bridge
    internal: true
